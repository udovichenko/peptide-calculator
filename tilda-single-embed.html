<div id="devatstack-peptide-calculator"></div>
<script>
class PeptideCalculator {
    constructor(target = "#devatstack-peptide-calculator") {
        const root = document.querySelector(target);
        if (!root) {
            console.error(`Target element "${target}" not found.`);
            return;
        }
        root.innerHTML = '';
        const targetElement = this._elem("div", "devatstack-peptide-calculator");
        root.appendChild(targetElement);
        this.target = targetElement;

        this.injectStyle();

        this.formData = {
            scaleUnits: 30,
            waterUnit: "ml",
            waterValue: 5,
            peptides: [
                {
                    id: 1,
                    peptideQuantityUnit: "mg",
                    peptideQuantity: 5,
                    peptideDosageUnit: "mcg",
                    peptideDosageValue: 250,
                }
            ],
        };

        this.peptideIdCounter = 1;
        this._mainForm();
        this._render();
    }

    _volumeSvg() {
        return `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 22 23"><path fill="#FBFBFB" fill-rule="evenodd" d="M17.38.37l4.28 4.279A1.21 1.21 0 0119.95 6.36l-1.713 1.711 2.139 2.14a1.21 1.21 0 11-1.711 1.711l-.855-.855-6.846 6.846a3.631 3.631 0 01-5.134 0L2.051 21.69A1.21 1.21 0 01.34 19.979l3.777-3.777a3.63 3.63 0 010-5.135l6.846-6.847-.855-.855a1.21 1.21 0 111.71-1.711l2.14 2.138 1.712-1.711A1.211 1.211 0 1117.38.369zm-4.706 5.562l-1.71 1.712.855.855a1.21 1.21 0 11-1.712 1.712l-.855-.856-.856.856.856.856a1.21 1.21 0 11-1.711 1.71l-.856-.855-.856.856a1.21 1.21 0 000 1.712l1.712 1.712a1.21 1.21 0 001.71 0l6.847-6.847-3.424-3.423zm4.708-2.14L15.67 5.504l.855.856 1.713-1.711-.856-.857z" clip-rule="evenodd"></path></svg>`;
    }

        return `<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="24" height="24" fill="none" viewBox="0 0 24 24"><path fill="url(#pattern0_83_74)" d="M0 0H24V24H0z"></path><defs><pattern id="pattern0_83_74" width="1" height="1" patternContentUnits="objectBoundingBox"><use transform="matrix(.0098 0 0 .0098 -.132 0)" xlink:href="#image0_83_74"></use></pattern><image id="image0_83_74" width="126" height="102" xlink:href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAH4AAABmCAYAAAANpiV+AAAACXBIWXMAABYlAAAWJQFJUiTwAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAQcSURBVHgB7Z1BbhMxFIbfFPZwA0Yq+96AILGHBfuWE3TRA3SRAyDRPRLlBj0AQjkAEj1ApXAD2APhPeKRqjSZmSaN/fz+/5OsiWYmSjz/2H62n59FCCGEEBKRRpyzWCwmejjS9FTq4appmmtxjGvhVfT3ejiVOrlQ8c/EKQfiFBXdBK9VdOM05cElbku8PrQbPTyTuplrqX8uDvEs/G8JgAr/WBzitqon+4XCg0LhQXHZ/oxkKj44lwqp1rjzYjTV8j9XYVUPCoUHhcKD4qWdtIkYSzZS16bTBwPf+So+GPqfX9LHn5ps4mam7f5MClPUuEuCm1U8WXP5kcTgz5pzc01TfQE+SyGKCT9i5i2y8B3FZvCKtPGVT7c+JKfpWWQne4nXjJ7o4eOIWxFKfMdbLflXkpESwo+dbrXayL2H0AALTX9H3Jd9+jZrVZ+MubFz7Aupn7F5aNOzyUbuNv7oHvd2paXGF2Cb/36fZ7MzufvxQw6T1r+9kGWfNxqbuq0dWZ1JvU0gzHIbObnQqtxe6qzVeR8lh2wbqd9425bieS9R4hu5m/Gx1m/tuMl7iRK/7m1vBGPCyE3ec/9gXxUXvep3lXdOy4JC4UGh8KB468cfa3/3hcSkFUd4E76V+tfLbcKV4cqqHhQKDwqFB4XCg0LhQaHwoHjrzpmf+SeJybuUXOBN+LmHVSb7QAemXoojWNWDQuFByS38YuBaBJfqTbjKe4kSv87NKLroHW7yXsK4s0zasqLO6wRFdMNN3kta9UiCr1I87zTuQKHwoFB4UGoOcLg1aWXqsaZfmr6XDElSCjjhUzCiyco5C9ZgwQkiLtZcC1RVrwJvWrFq56BCs6C18Sc91yh8YPo8eGva7GhnaNWDQuFBofCghOrOqdVu7fQT2RL9/kYbQLt6PyQQIYRPgnf71O1ipN30/IYdLDDTNEJ/P0qJt7Cgx7J/7MWysGSvpHKqb+NvDb/mYpI7GOE+iGDclRCBwjugRHtbfRsfQfgSfvjVB2GsXvi0T/tU8jGN0LULYdWrEFM1uEwMM/LanluHom30CTqX5Y4SIUKuhhnAUUEu9XDZd8+IzQEPBQQO2YJC4UGh8KBQeFDQhL/e8lo40ITvs/o/CBBQwmt37f+06ppLZ2i+9XB+9Wmwx0S26VWbu79C8qfvgFxJo0LPZTkSBwutelAoPCgUHhQKDwqFB4XCg0LhQaHwoFB4UDxuPyYBsaHhN+KI3MIPeae2ms4Fk7lkJHdVHzIW/QOR9dlkFT5NjlD8u8xy++pn3/1Q23CbDv0m5DaHuYXPbtWnlS9nQjqKrMwptt9pCipohlzUvWSHMOePYp4/RTe6VfFbWYr/WnDCjZng5gJ2UdLzx80OxynYQOcOFRET2Zq5a0RXL0IIIYT     }
    _waterSvg() {
        return `<div class="d-flex mt-3 align-items-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="26" height="26" fill="none" viewBox="0 0 26 26"><path fill="url(#pattern0_237_7571)" d="M0 0H26V26H0z"></path><defs><pattern id="pattern0_237_7571" width="1" height="1" patternContentUnits="objectBoundingBox"><use transform="scale(.02)" xlink:href="#image0_237_7571"></use></pattern><image id="image0_237_7571" width="50" height="50" xlink:href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyCAYAAAAeP4ixAAAACXBIWXMAAAsTAAALEwEAmpwYAAACzElEQVR4nO2ayWsUQRSHKyCaSK5JLipGRTwJCh5cIqIHowieNHgx4E1FxQUEE4O4Iep/4EEFD3oJZhRPIoIQ0XgQF9yDhyjCgGAkmoyaTyrzgs04k17mdVUP+kFg6K5+9fvSqeqqnhjzn3CARuA+0G8/m1oFuMYfeoE6U2sAB/mb/aaWANYAP4DxEhF7bLWpBYAm4KMEP1vmrnwCWkyWAeqAnAQeAKZTnluZHi/AAQn6FVgoxyqx12QRYAkwJiE7AscrMQosNlmC4p/QEwl4oeTcVDy215qsAJySYK+AmSXnwjhusgCwFCgAv4C2MufDsFPyMj/pBWAG8FwCnTdlIBpPbS3jC6BHgrwA6iu0iUq3e4NiwDnAiDy9107RLirfgFa3FsWAkw++yyHt4tDrzqAYrl06/gw0h7SNy0ZXEvXAO+l0V4T2cXnjZODbpYV0+BKYloKIZaeLuzE00RVsjnhNEj4ADWmK7JOO+qOuXknO7rQkGgL7jMiboypEhio9m7TuxoOY11XDnjQ2TK+l+BaHIm9VN2DAeik8GGWmUhSxrNMUuTpREroSXFstVzRXuMNSdJEHkWGVQW+XDFLwWcLrNWjXEDktxU54FDmpIXJHim3wKHJbQ+S9FJvtUWRQQ8Runkg64JRERjREJt9VNXoUGdUQyUuxBR5F8hoij6RYm0eRAQ2RS1LskEeRixoiO6TYXY8inRoiLfI20P40eRAphL3gSPLq55wHkT4VCQmzXIp+B2Y5FlmlJiKBbkrh63E2O1VK5FQlJFBrYDl/xIHIF2CuuoiE2iad/AS2pygyHvzWKy2Zo4HOjqUk0pWqRCBcd+A79BvAfCWRcWcSgYAdgTFjZ7Mz5YRijomtTiVKJoBcyW/0HnAY2ATMiyjRl9rAjgOwUsLYp3BUCjKVrzBZA2i26yK7yJP/fMjLfmZMPj+Uc51JljvmX+A3WIZSFjgLOY8AAAAASUVORK5CYII="></image></defs></svg><p class="devatstack-Calc-text-1 m-0 text-break"></div>`;
    }
    _plusSvg() {
        return `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6m0 0v6m0-6h6m-6 0H6" /></svg>`;
    }
    _minusSvg() {
        return `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20 12H4" /></svg>`;
    }

    injectStyle() {
        if (document.getElementById("devatstack-peptide-calculator-style")) return;

        const css = `
     #devatstack-peptide-calculator {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .devatstack-peptide-calculator {
        max-width: 420px;
        width: auto;
        padding: 20px;
        background: linear-gradient(145deg, #606060 0%, #303030 100%);
        border: 1px solid #202020;
        border-radius: 12px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: #f0f0f0;
      }
      .devatstack-main-form { display: flex; flex-direction: column; gap: 20px; }
      .devatstack-text-line { display: flex; gap: 8px; align-items: center; font-size: 0.9rem; }
      .devatstack-text-line svg { width: 18px; height: 18px; }
      .devatstack-input-box { width: 100%; display: flex; flex-direction: column; gap: 10px; }
      .devatstack-input-group { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
      .devatstack-input-group label { font-size: 1.2rem; font-weight: 600; }
      .devatstack-input-group small { font-weight: 400; font-size: 0.8rem; opacity: 0.8; }
      .devatstack-input-group select, .devatstack-input-group input {
        padding: 10px;
        background: #202020;
        border: 1px solid #505050;
        color: #f0f0f0;
        font-size: 1.1rem;
        border-radius: 8px;
        text-align: center;
      }
      .devatstack-input-group select { width: 100px; }
      .devatstack-input-group input { width: 120px; }
      .devatstack-input-with-unit { display: flex; align-items: center; gap: 0; }
      .devatstack-input-with-unit input { border-top-right-radius: 0; border-bottom-right-radius: 0; }
      .devatstack-input-with-unit select { border-top-left-radius: 0; border-bottom-left-radius: 0; border-left: none; width: 80px; }
      .devatstack-peptides-container { display: flex; flex-direction: column; gap: 15px; }
      .devatstack-peptide-item { background-color: rgba(48, 48, 48, 0.3); padding: 15px; border-radius: 8px; border: 1px solid #505050; }
      .devatstack-peptide-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
      .devatstack-peptide-header h3 { margin: 0; font-size: 1.1rem; color: #a0a0a0; }
      .devatstack-peptide-controls { display: flex; gap: 10px; }
      .devatstack-btn-icon { background: #202020; border: 1px solid #505050; border-radius: 6px; padding: 8px; cursor: pointer; color: #f0f0f0; transition: all 0.2s; }
      .devatstack-btn-icon:hover { background: #505050; }
      .devatstack-btn-add { background: #808080; }
      .devatstack-btn-add:hover { background: #606060; }
      .devatstack-btn-remove { background: #505050; border-color: #404040; }
      .devatstack-btn-remove:hover { background: #404040; }
      .devatstack-peptide-inputs { display: flex; flex-direction: column; gap: 15px; }
      .devatstack-results-container { margin-top: 25px; border-top: 1px solid #505050; padding-top: 20px; }
      .devatstack-main-scale { width: 100%; max-width: 400px; font-family: inherit; }
      .devatstack-formulate-header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
      .devatstack-formulate-header h4 { font-size: 1.5rem; margin: 0; }
      .devatstack-formulate-header p { font-weight: bold; font-size: 1.5rem; margin: 0; }
      .devatstack-formulate-scale { border: 1px solid #505050; width: 100%; max-width: 400px; height: 60px; background-color: #202020; position: relative; border-radius: 5px; }
      .devatstack-formulate-value-bar-box { width: 100%; height: 100%; position: absolute; z-index: 1; overflow: hidden; border-radius: 5px; }
      .devatstack-formulate-value-bar { height: 100%; background-color: #808080; transition: width 0.3s ease-in-out; }
      .devatstack-formulate-bars { margin-left: -5px; width: 100%; height: 100%; display: flex; position: absolute; z-index: 2; padding: 0 1px; box-sizing: border-box; }
      .devatstack-unit-box { height: 100%; display: flex; }
      .devatstack-formulate-bar { width: calc(100% / 5); height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: space-between; text-align: center; position: relative; }
      .devatstack-bar-line-full { width: 2px; height: 45%; background-color: #f0f0f0; border-radius: 1px; }
      .devatstack-bar-line-small { width: 1px; height: 20%; background-color: rgba(240,240,240,0.7); }
      .devatstack-line-value { font-size: 0.8rem; font-weight: 500; color: #f0f0f0; margin-bottom: 4px; }
      .devatstack-output-box { margin-top: 20px; }
      .devatstack-output-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 12px; }
      .devatstack-output-list li { font-size: 1rem; color: #f0f0f0; background-color: rgba(48, 48, 48, 0.8); padding: 10px; border-radius: 6px; }
      .devatstack-output-list li::before { content: '•'; color: #808080; font-weight: bold; display: inline-block; width: 1em; margin-left: -1em; }
    `;
        const style = document.createElement("style");
        style.id = "devatstack-peptide-calculator-style";
        style.textContent = css;
        document.head.appendChild(style);
    }

    _render() {
        this._formulate(this.formData);
    }

    _addPeptide() {
        this.peptideIdCounter++;
        const newPeptide = {
            id: this.peptideIdCounter,
            peptideQuantityUnit: "mg",
            peptideQuantity: 0,
            peptideDosageUnit: "mcg",
            peptideDosageValue: 0,
        };
        this.formData.peptides.push(newPeptide);
        this._renderPeptides();
        this._render();
    }

    _removePeptide(peptideId) {
        if (this.formData.peptides.length > 1) {
            this.formData.peptides = this.formData.peptides.filter(p => p.id !== peptideId);
            this._renderPeptides();
            this._render();
        }
    }

    _updatePeptide(peptideId, field, value) {
        const peptide = this.formData.peptides.find(p => p.id === peptideId);
        if (peptide) {
            peptide[field] = value;
            this._render();
        }
    }

    _mainForm() {
        const mainForm = this._elem("div", "devatstack-main-form");
        this.target.appendChild(mainForm);

        const volumeBox = this._elem("div", "devatstack-input-box");
        mainForm.appendChild(volumeBox);
        volumeBox.innerHTML = `
      <div class="devatstack-text-line">${this._volumeSvg()}Select the Total Volume of your Syringe</div>
      <div class="devatstack-input-group">
        <label>Volume</label>
      </div>
    `;
        const volumeSelect = this._elem("select");
        [30, 50, 100].forEach(val => {
            const opt = this._elem("option", null, `${val} units`);
            opt.value = val;
            if (val === this.formData.scaleUnits) opt.selected = true;
            volumeSelect.appendChild(opt);
        });
        volumeSelect.onchange = () => {
            this.formData.scaleUnits = parseFloat(volumeSelect.value);
            this._render();
        };
        volumeBox.querySelector('.devatstack-input-group').appendChild(volumeSelect);

        const peptidesContainer = this._elem("div", "devatstack-peptides-container");
        mainForm.appendChild(peptidesContainer);
        this.peptidesContainer = peptidesContainer;

        this._renderPeptides();

        const waterBox = this._elem("div", "devatstack-input-box");
        mainForm.appendChild(waterBox);
        waterBox.innerHTML = `
      <div class="devatstack-text-line">${this._waterSvg()}Enter the Quantity of Bacteriostatic Water</div>
      <div class="devatstack-input-group">
        <label>Water</label>
      </div>
    `;
        const waterInputWithUnit = this._elem("div", "devatstack-input-with-unit");
        const waterInput = this._elem("input");
        waterInput.type = "number";
        waterInput.min = "0";
        waterInput.step = "0.1";
        waterInput.value = this.formData.waterValue;
        waterInput.oninput = () => {
            const value = parseFloat(waterInput.value);
            if (!isNaN(value) && value >= 0) {
                this.formData.waterValue = value;
                this._render();
            }
        };
        const waterUnitSelect = this._elem("select");
        ["ml", "iu"].forEach(val => {
            const opt = this._elem("option", null, val);
            opt.value = val;
            if (val === this.formData.waterUnit) opt.selected = true;
            waterUnitSelect.appendChild(opt);
        });
        waterUnitSelect.onchange = () => {
            const previousUnit = this.formData.waterUnit;
            const newUnit = waterUnitSelect.value;
            let newValue = parseFloat(waterInput.value) || 0;

            if (previousUnit === 'ml' && newUnit === 'iu') {
                newValue = newValue * 100;
            } else if (previousUnit === 'iu' && newUnit === 'ml') {
                newValue = newValue / 100;
            }

            this.formData.waterUnit = newUnit;
            this.formData.waterValue = newValue;
            waterInput.value = newValue.toFixed(2);
            this._render();
        };
        waterInputWithUnit.append(waterInput, waterUnitSelect);
        waterBox.querySelector('.devatstack-input-group').appendChild(waterInputWithUnit);
    }

    _renderPeptides() {
        this.peptidesContainer.innerHTML = '';

        this.formData.peptides.forEach((peptide, index) => {
            const peptideItem = this._elem("div", "devatstack-peptide-item");

            const peptideHeader = this._elem("div", "devatstack-peptide-header");
            const title = this._elem("h3", null, `Peptide ${index + 1}`);
            const controls = this._elem("div", "devatstack-peptide-controls");

            if (index === this.formData.peptides.length - 1) {
                const addBtn = this._elem("button", "devatstack-btn-icon devatstack-btn-add");
                addBtn.innerHTML = this._plusSvg();
                addBtn.onclick = (e) => {
                    e.preventDefault();
                    this._addPeptide();
                };
                controls.appendChild(addBtn);
            }

            if (this.formData.peptides.length > 1) {
                const removeBtn = this._elem("button", "devatstack-btn-icon devatstack-btn-remove");
                removeBtn.innerHTML = this._minusSvg();
                removeBtn.onclick = (e) => {
                    e.preventDefault();
                    this._removePeptide(peptide.id);
                };
                controls.appendChild(removeBtn);
            }

            peptideHeader.append(title, controls);
            peptideItem.appendChild(peptideHeader);

            const peptideInputs = this._elem("div", "devatstack-peptide-inputs");

            const peptideQuantityBox = this._elem("div", "devatstack-input-box");
            peptideQuantityBox.innerHTML = `
        <div class="devatstack-text-line">${this._peptideSvg()}Enter the Quantity of Peptide</div>
        <div class="devatstack-input-group">
          <label>In Vial</label>
        </div>
      `;
            const peptideInputWithUnit = this._elem("div", "devatstack-input-with-unit");
            const peptideInput = this._elem("input");
            peptideInput.type = "number";
            peptideInput.min = "0";
            peptideInput.step = "0.1";
            peptideInput.value = peptide.peptideQuantity;
            peptideInput.oninput = () => {
                const value = parseFloat(peptideInput.value);
                if (!isNaN(value) && value >= 0) {
                    this._updatePeptide(peptide.id, 'peptideQuantity', value);
                }
            };
            const peptideUnit = this._elem("select");
            ["mg"].forEach(val => {
                const opt = this._elem("option", null, val);
                opt.value = val;
                if (val === peptide.peptideQuantityUnit) opt.selected = true;
                peptideUnit.appendChild(opt);
            });
            peptideUnit.onchange = () => {
                this._updatePeptide(peptide.id, 'peptideQuantityUnit', peptideUnit.value);
            };
            peptideInputWithUnit.append(peptideInput, peptideUnit);
            peptideQuantityBox.querySelector('.devatstack-input-group').appendChild(peptideInputWithUnit);
            peptideInputs.appendChild(peptideQuantityBox);

            const doseBox = this._elem("div", "devatstack-input-box");
            doseBox.innerHTML = `
        <div class="devatstack-text-line">${this._volumeSvg()}Enter the Quantity of Peptide in each dose</div>
        <div class="devatstack-input-group">
          <label>Per Dose</label>
        </div>
      `;
            const doseInputWithUnit = this._elem("div", "devatstack-input-with-unit");
            const doseInput = this._elem("input");
            doseInput.type = "number";
            doseInput.min = "0";
            doseInput.step = peptide.peptideDosageUnit === "mcg" ? "1" : "0.001";
            doseInput.value = peptide.peptideDosageValue;
            doseInput.oninput = () => {
                const value = parseFloat(doseInput.value);
                if (!isNaN(value) && value >= 0) {
                    this._updatePeptide(peptide.id, 'peptideDosageValue', value);
                }
            };
            const doseUnitSelect = this._elem("select");
            ["mcg", "mg"].forEach(val => {
                const opt = this._elem("option", null, val);
                opt.value = val;
                if (val === peptide.peptideDosageUnit) opt.selected = true;
                doseUnitSelect.appendChild(opt);
            });

            doseUnitSelect.onchange = () => {
                const previousUnit = peptide.peptideDosageUnit;
                const newUnit = doseUnitSelect.value;
                let newValue = parseFloat(doseInput.value) || 0;

                if (previousUnit === 'mcg' && newUnit === 'mg') {
                    newValue = newValue / 1000;
                } else if (previousUnit === 'mg' && newUnit === 'mcg') {
                    newValue = newValue * 1000;
                }

                this._updatePeptide(peptide.id, 'peptideDosageUnit', newUnit);
                this._updatePeptide(peptide.id, 'peptideDosageValue', newValue);
                doseInput.value = newValue.toFixed(newUnit === 'mcg' ? 0 : 3);
                doseInput.step = newUnit === 'mcg' ? '1' : '0.001';
            };

            doseInputWithUnit.append(doseInput, doseUnitSelect);
            doseBox.querySelector('.devatstack-input-group').appendChild(doseInputWithUnit);
            peptideInputs.appendChild(doseBox);

            peptideItem.appendChild(peptideInputs);
            this.peptidesContainer.appendChild(peptideItem);
        });
    }

    _formulate(formData) {
        let waterVolumeInML = parseFloat(formData.waterValue) || 0;
        if (formData.waterUnit === "iu") {
            waterVolumeInML = waterVolumeInML / 100;
        }

        let totalPeptideInMg = 0;
        let totalDesiredDoseInMg = 0;

        formData.peptides.forEach(peptide => {
            let peptideQuantity = parseFloat(peptide.peptideQuantity) || 0;
            let peptideDosageValue = parseFloat(peptide.peptideDosageValue) || 0;

            totalPeptideInMg += peptideQuantity;

            let peptidePerDoseInMg = peptideDosageValue;
            if (peptide.peptideDosageUnit === "mcg") {
                peptidePerDoseInMg = peptideDosageValue / 1000;
            }
            totalDesiredDoseInMg += peptidePerDoseInMg;
        });

        let concentrationInMgPerML = 0;
        let totalDosesInVial = 0;
        let volumePerDoseInML = 0;
        let unitsToDraw = 0;

        if (waterVolumeInML > 0 && totalPeptideInMg > 0) {
            concentrationInMgPerML = totalPeptideInMg / waterVolumeInML;
        }

        if (concentrationInMgPerML > 0 && totalDesiredDoseInMg > 0) {
            totalDosesInVial = totalPeptideInMg / totalDesiredDoseInMg;
            volumePerDoseInML = totalDesiredDoseInMg / concentrationInMgPerML;
            unitsToDraw = volumePerDoseInML * 100;
        }

        const formattedUnits = isFinite(unitsToDraw) && unitsToDraw >= 0 ? unitsToDraw.toFixed(0) : '0';
        const formattedConcentration = isFinite(concentrationInMgPerML) ? concentrationInMgPerML.toFixed(2) : '0.00';
        const formattedTotalDoses = isFinite(totalDosesInVial) && totalDosesInVial >= 0 ? Math.floor(totalDosesInVial) : '0';
        const formattedVolumePerDose = isFinite(volumePerDoseInML) && volumePerDoseInML >= 0 ? volumePerDoseInML.toFixed(2) : '0.00';

        let doseDescription = '';
        if (formData.peptides.length === 1) {
            const peptide = formData.peptides[0];
            doseDescription = `${parseFloat(peptide.peptideDosageValue).toFixed(peptide.peptideDosageUnit === 'mcg' ? 0 : 3)}${peptide.peptideDosageUnit}`;
        } else {
            doseDescription = formData.peptides
                .map(peptide => `${parseFloat(peptide.peptideDosageValue).toFixed(peptide.peptideDosageUnit === 'mcg' ? 0 : 3)}${peptide.peptideDosageUnit}`)
                .join(' + ');
        }

        let resultsContainer = document.querySelector(".devatstack-results-container");
        if (!resultsContainer) {
            resultsContainer = this._elem("div", "devatstack-results-container");
            this.target.appendChild(resultsContainer);
        }
        resultsContainer.innerHTML = '';

        const mainScale = this._elem("div", "devatstack-main-scale");
        resultsContainer.appendChild(mainScale);

        const formulateHeader = this._elem("div", "devatstack-formulate-header");
        formulateHeader.innerHTML = `<h4>Formulate</h4><p>${formattedUnits} units</p>`;
        mainScale.appendChild(formulateHeader);

        const scale = this._elem("div", "devatstack-formulate-scale");
        mainScale.appendChild(scale);

        const barFillPercent = isFinite(unitsToDraw) && unitsToDraw >= 0 ? Math.min((unitsToDraw / formData.scaleUnits) * 100, 100) : 0;
        scale.innerHTML = `
      <div class="devatstack-formulate-value-bar-box">
        <div class="devatstack-formulate-value-bar" style="width:${barFillPercent}%"></div>
      </div>
    `;

        let scaleDivide = 6;
        let valueGap = 5;
        if (formData.scaleUnits === 50) {
            scaleDivide = 10;
            valueGap = 5;
        } else if (formData.scaleUnits === 100) {
            scaleDivide = 10;
            valueGap = 10;
        }

        const formulateBars = this._elem("div", "devatstack-formulate-bars");
        scale.appendChild(formulateBars);
        let showVal = 0;
        for (let i = 0; i < scaleDivide; i++) {
            const unitBox = this._elem("div", "devatstack-unit-box");
            unitBox.style.width = `${100 / scaleDivide}%`;
            formulateBars.appendChild(unitBox);
            for (let j = 0; j < 5; j++) {
                const formulateBar = this._elem("div", "devatstack-formulate-bar");
                const barLine = this._elem("div", `${j === 0 ? "devatstack-bar-line-full" : "devatstack-bar-line-small"}`);
                formulateBar.appendChild(barLine);
                if (j === 0) {
                    const barValue = this._elem("div", "devatstack-line-value", showVal);
                    formulateBar.appendChild(barValue);
                    showVal += valueGap;
                }
                unitBox.appendChild(formulateBar);
            }
        }
        const unitBox = this._elem("div", "devatstack-unit-box");
        unitBox.style.width = `fit-content`;
        unitBox.style.position = `absolute`;
        unitBox.style.right = `-20px`;
        formulateBars.appendChild(unitBox);
        const formulateBar = this._elem("div", "devatstack-formulate-bar");
        const barLine = this._elem("div", "devatstack-bar-line-full");
        formulateBar.appendChild(barLine);
        const barValue = this._elem("div", "devatstack-line-value", showVal);
        formulateBar.appendChild(barValue);
        unitBox.appendChild(formulateBar);

        const outputBox = this._elem("div", "devatstack-output-box");
        mainScale.appendChild(outputBox);
        const ul = this._elem("ul", "devatstack-output-list");
        outputBox.appendChild(ul);

        ul.innerHTML = `
      <li>Draw <strong>${formattedUnits} units</strong> for a <strong>${doseDescription}</strong> dose.</li>
      <li>With a concentration of <strong>${formattedConcentration} mg/mL</strong>, each vial contains <strong>${formattedTotalDoses} doses</strong>.</li>
      <li>Each dose is <strong>${formattedVolumePerDose} mL</strong>.</li>
    `;
    }

    _elem(tag, cls, inner) {
        const el = document.createElement(tag);
        if (cls) el.className = cls;
        if (inner !== undefined) el.innerHTML = inner;
        return el;
    }
}

(function () {
    if (window.__devatstackPeptideCalculatorInitialized) return;

    function init() {
        if (window.__devatstackPeptideCalculatorInitialized) return;
        const root = document.getElementById("devatstack-peptide-calculator");
        if (!root) return;
        window.__devatstackPeptideCalculatorInitialized = true;
        new PeptideCalculator("#devatstack-peptide-calculator");
    }

    if (window.t_onReady) {
        t_onReady(init);
    } else if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init);
    } else {
        init();
    }
})();
</script>
